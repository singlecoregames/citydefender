name: Deploy to GitHub Pages

# Deploys master only. Work branches are merged into master before deploying
# (see docs/PLAYTESTING.md); triggering on both raced two runs into the shared
# `pages` concurrency group within the same second, and the cancel/deploy
# scramble intermittently failed GitHub's Pages backend ("Deployment failed,
# try again later").
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # enablement: true lets the action (re)enable the Pages site via the API
      # if it isn't configured — the repo's Pages setting was found disabled.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
