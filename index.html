<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>City Defender</title>
    <!-- Installable PWA + full-bleed standalone on mobile (incl. landscape). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta name="theme-color" content="#1f1f1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent + viewport-fit=cover lets the canvas bleed under the
         notch / status bar so the game fills the whole screen. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="City Defender" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- CRT overlay: sits above the game canvas (prepended at runtime, so
           the canvas lands before this) and below every DOM UI layer — the
           filter touches the picture, never the interface. -->
      <div id="crt"></div>
      <!-- Full-screen feedback layers: flash (boss kill / megabomb), vignette
           (low-HP heartbeat, combo break) and floating kill numbers. All
           pointer-transparent, above the picture, below the interactive UI. -->
      <div id="fx-flash"></div>
      <div id="fx-vignette"></div>
      <div id="float-layer"></div>
      <div id="hud">
        <div id="hud-top">
          <div id="hud-scrap">⬡ 0</div>
          <div id="hud-wave"></div>
        </div>
        <div id="hud-combo" class="hidden"></div>
        <div id="night-banner" class="hidden"></div>
        <div id="hud-ammo"></div>
        <div id="ability-bar"></div>
        <button id="hud-mute" aria-label="mute">🔊</button>
      </div>
      <div id="freefire-tint" class="hidden"></div>
      <div id="titlescreen">
        <div id="title-logo">CITY <span class="accent">DEFENDER</span></div>
        <div id="title-tagline">MISSILE COMMAND × ACTIVE INCREMENTAL</div>
        <button id="title-start">START</button>
        <button id="title-reset">RESET SAVE</button>
        <button id="title-lang">🌐 English</button>
        <div id="title-version">prototype — title pending</div>
      </div>
      <div id="dayscreen" class="hidden">
        <!-- Compact chrome: result line on top, the tree fills the rest, all
             actions live on one bottom bar. The bank chip is re-parented
             INTO #day-shop at build time (top-right overlay). -->
        <div id="day-top">
          <h1 id="day-title"></h1>
          <p id="day-subtitle"></p>
        </div>
        <div id="day-shop"><div id="day-bank">⬡ 0</div></div>
        <div id="day-bottom">
          <button id="day-reset">RESET RUN</button>
          <div id="day-jumps">
            <button id="day-jump-cheap" class="day-jump"></button>
            <button id="day-jump-rich" class="day-jump"></button>
          </div>
          <button id="day-next">NEXT NIGHT ▸</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
